<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Location</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    >
    <link rel="stylesheet" href="location-picker.css">
  </head>
  <body>
    <header class="amazon-header">
      <img src="Screenshot 2025-11-04 210432.png" class="amazon-logo" alt="Amazon">
    </header>

    <main class="location-page">
      <section class="location-card">
        <div class="card-header">
          <h1>Choose your location</h1>
          <button type="button" class="close-btn" id="cancelBtn" aria-label="Close location page">×</button>
        </div>

        <p class="card-copy">Select a delivery location to see product availability and delivery options.</p>

        <div class="saved-address">
          <p class="section-title">Your selected address</p>
          <button type="button" class="address-option active" id="selectedAddressBtn">
            <span class="address-name" id="selectedLocationDisplay">Ghaziabad 201009</span>
            <span class="address-meta" id="selectedCoordinates">Latitude: 28.66920, Longitude: 77.45380</span>
          </button>
        </div>

        <button type="button" class="use-location-btn" id="useCurrentLocationBtn">Use my current location</button>

        <div class="divider"><span>or enter an Indian pincode</span></div>

        <div class="pin-row">
          <input id="pincodeInput" class="pin-input" type="text" inputmode="numeric" maxlength="6" placeholder="Enter pincode">
          <button type="button" class="apply-btn" id="applyPincodeBtn">Apply</button>
        </div>

        <div class="divider"><span>or search by area / location</span></div>

        <label for="locationName" class="field-label">Area / landmark</label>
        <div class="area-row">
          <input id="locationName" class="field-input" type="text" placeholder="Example: Connaught Place, New Delhi">
          <button type="button" class="apply-btn" id="applyAreaBtn">Search</button>
        </div>

        <div class="divider"><span>or choose on map</span></div>

        <div class="map-panel">
          <div id="locationMap" aria-label="Map to choose a location"></div>
        </div>

        <div class="button-row">
          <button type="button" class="primary-btn" id="saveLocationBtn">Deliver to this address</button>
        </div>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="location-picker.js"></script>
  </body>
</html>
