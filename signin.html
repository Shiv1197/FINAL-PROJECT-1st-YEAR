<!DOCTYPE html>
<html lang="en">
 <head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title data-i18n="signin.pageTitle">SIGN IN</title>
 <style>
    .signin-page{
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }
    .logo img{
        height: 62px;
        margin-top: 5px;
        margin-bottom: 16px;
    }
    .outer-box{
        display: block;
        border: 1.5px solid #d5d9d9;
        border-radius: 8px;
        width: 520px;
    }
    .inner-box{
        position: relative;
        padding: 26px 26px;
        font-family: "Inter", "Roboto", Arial, sans-serif;
    }
    h1{
        font-weight: 400;
        font-size: 43px;
        line-height: 36px;
        padding: 0;
        margin: 0;
    }
    input[type="email"], input[type="tel"], input[type="password"]{
        width: 100%;
        height: 40px;
        border-radius: 5px;
        font-size: 20px;
        margin-top: 8px;
    }
    label{
        font-size: 20px;
        font-weight: 600;
    }
    input[type="submit"]{
        width: 100%;
        height: 45px;
        background-color: #ffd814;
        border: none;
        border-radius: 100px;
        font-size: 20px;
        font-weight: 600;
        margin-top: 16px;
        cursor: pointer;
    }
 </style>
 </head>
 <body>
    <div class="signin-page">
        <div class="logo">
            <img src="Screenshot 2025-12-22 123259.png" alt="Logo" />
        </div>
        <div class="outer-box">
        <div class="inner-box">
            <h1 data-i18n="signin.createAccount">Create Account</h1></br>
            <label data-i18n="signin.emailLabel">Email</label></br>
<input type="email" name="Email" placeholder="Email" data-i18n-placeholder="signin.emailPlaceholder" required><br><br>
            <label data-i18n="signin.mobileLabel">Mobile number</label></br>
  <input type="tel" name="contact" placeholder="Mobile number" data-i18n-placeholder="signin.mobilePlaceholder" required><br><br>
            <label data-i18n="signin.passwordLabel">Password (at least 6 characters)</label></br>
            <input type="password" name="Password" placeholder="Password" data-i18n-placeholder="signin.passwordPlaceholder" max="6" required><br><br>
            <p data-i18n="signin.passwordHelp">Passwords must be at least 6 characters.</p>
            <input type="submit" value="Sign up" data-i18n-value="signin.submit" onclick="window.location.href='webpage.html'"></br><br>
            <p data-i18n="signin.terms">By creating an account or logging in, you agree to Amazon's Conditions of Use and Privacy Policy.</p>
        </div>
        </div>
    </div>
 <script src="i18n.js"></script>
 </body>
</html>
